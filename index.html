<style>
:root{
  --primary:#ff6b35;--bg:#080d1a;--card:#0d1526;--brd:#1c2a45;
  --wh:#e2e8f0;--mt:#64748b;--rd:#ef4444;--gn:#10b981;--yw:#f59e0b;--bl:#38bdf8;
  --fh:'Rajdhani',sans-serif;--fm:'Share Tech Mono',monospace;
  --radius:12px;--radius-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{background:var(--bg);color:var(--wh);font-family:var(--fh);font-size:14px;
  padding-bottom:64px;overflow-x:hidden;}
button{font-family:var(--fh);touch-action:manipulation;}
input,select,textarea{font-family:var(--fh);background:#0d1526;color:var(--wh);
  border:1px solid var(--brd);border-radius:var(--radius-sm);padding:8px 10px;
  font-size:14px;width:100%;outline:none;}
select{appearance:none;-webkit-appearance:none;}
/* ── Auth ── */
#mAuth{position:fixed;inset:0;background:var(--bg);z-index:900;
  display:flex;align-items:center;justify-content:center;padding:20px;}
.authBox{background:var(--card);border:1px solid var(--brd);border-radius:14px;
  padding:28px 20px;width:100%;max-width:360px;}
.authLogo{color:var(--primary);font-size:20px;font-weight:800;letter-spacing:2px;
  text-align:center;margin-bottom:4px;}
.authSub{color:var(--mt);font-size:11px;text-align:center;margin-bottom:22px;}
.authLbl{color:var(--mt);font-size:11px;text-transform:uppercase;letter-spacing:.5px;
  margin-bottom:5px;}
.authBtn{width:100%;background:var(--primary);color:#000;border:none;
  border-radius:8px;padding:13px;font-size:15px;font-weight:700;letter-spacing:1px;
  cursor:pointer;margin-top:4px;}
.authErr{font-size:11px;text-align:center;margin-top:8px;min-height:16px;}
/* ── App ── */
#mApp{display:none;}
/* ── Header ── */
.mhd{display:flex;align-items:center;gap:8px;padding:10px 14px 8px;
  background:#050a14;border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:100;}
.mhd-logo{color:var(--primary);font-weight:800;font-size:17px;letter-spacing:1px;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mhd-fb{width:7px;height:7px;border-radius:50%;background:#333;flex-shrink:0;}
.mhd-btn{background:none;border:1px solid var(--brd);border-radius:6px;color:var(--wh);
  padding:5px 9px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.mhd-btn.hi{background:var(--primary);border-color:var(--primary);color:#000;}
/* ── Ticker ── */
.mtick{font-size:11px;color:var(--yw);padding:4px 14px;background:#120c00;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;}
/* ── Bottom nav ── */
.mbnav{position:fixed;bottom:0;left:0;right:0;background:#050a14;
  border-top:1px solid var(--brd);display:grid;grid-template-columns:repeat(5,1fr);
  z-index:200;height:60px;}
.mbtn{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;color:var(--mt);font-size:9px;font-weight:700;letter-spacing:.3px;
  text-transform:uppercase;border:none;background:none;cursor:pointer;padding:4px 0;
  transition:color .15s;-webkit-tap-highlight-color:transparent;}
.mbtn.on{color:var(--primary);}
.mbtn-ico{font-size:19px;line-height:1;}
/* ── Pages ── */
.mpg{display:none;padding:12px 14px;min-height:calc(100vh - 120px);}
.mpg.on{display:block;}
/* ── Cards ── */
.mc{background:var(--card);border:1px solid var(--brd);border-radius:var(--radius);
  padding:12px;margin-bottom:10px;}
.mc-hd{font-size:11px;color:var(--mt);text-transform:uppercase;letter-spacing:.8px;
  margin-bottom:7px;font-weight:700;}
/* ── KPI Grid ── */
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.kc{background:var(--card);border:1px solid var(--brd);border-radius:var(--radius);
  padding:11px 10px;}
.klbl{font-size:10px;color:var(--mt);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
.kval{font-family:var(--fm);font-size:21px;font-weight:700;letter-spacing:1px;}
.kmeta{font-size:10px;color:var(--mt);margin-top:2px;}
.ksub{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.kchip{font-size:10px;padding:1px 6px;border-radius:8px;background:#1c2a45;}
/* ── Bar ── */
.bar{height:4px;background:#1c2a45;border-radius:2px;overflow:hidden;margin-top:5px;}
.barf{height:100%;border-radius:2px;transition:width .4s;}
/* ── Color helpers ── */
.cgn{color:#10b981;}.cy{color:#f59e0b;}.crd{color:#ef4444;}
/* ── Section title ── */
.msec{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  color:var(--primary);margin:14px 0 7px;padding-bottom:4px;
  border-bottom:1px solid var(--brd);}
/* ── List item ── */
.mli{display:flex;align-items:flex-start;gap:8px;padding:7px 0;
  border-bottom:1px solid #0d1526;}
.mli:last-child{border-bottom:none;}
.mli-ico{font-size:17px;flex-shrink:0;margin-top:1px;}
.mli-body{flex:1;min-width:0;}
.mli-t{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mli-s{font-size:11px;color:var(--mt);margin-top:1px;}
/* ── Person cards ── */
.perc{background:var(--card);border:1px solid var(--brd);border-radius:var(--radius);
  padding:11px;margin-bottom:8px;display:grid;grid-template-columns:40px 1fr;gap:9px;
  align-items:start;}
.perini{width:40px;height:40px;border-radius:50%;background:var(--primary);
  display:flex;align-items:center;justify-content:center;font-size:15px;
  font-weight:700;color:#000;flex-shrink:0;}
/* ── IAMO person card ── */
.ic{background:var(--card);border:1px solid var(--brd);border-radius:var(--radius);
  padding:11px;margin-bottom:8px;}
.ic-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.ic-nm{font-size:14px;font-weight:700;}
.ic-disc{font-size:11px;color:var(--mt);}
.ic-pct{font-family:var(--fm);font-size:24px;font-weight:700;}
.ic-row{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:6px;}
.ic-cell{background:#060e1e;border-radius:6px;padding:5px 8px;}
.ic-clbl{font-size:9px;color:var(--mt);text-transform:uppercase;}
.ic-cval{font-family:var(--fm);font-size:14px;font-weight:700;margin-top:2px;}
/* ── Sub tabs ── */
.stabs{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  padding-bottom:4px;margin-bottom:10px;scrollbar-width:none;}
.stabs::-webkit-scrollbar{display:none;}
.stab{background:none;border:1px solid var(--brd);border-radius:6px;color:var(--mt);
  padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;
  flex-shrink:0;text-transform:uppercase;letter-spacing:.5px;}
.stab.on{background:var(--primary);border-color:var(--primary);color:#000;}
/* ── IO Sheet ── */
#mioSheet{position:fixed;bottom:60px;left:0;right:0;background:#050a14;
  border-top:1px solid var(--brd);padding:14px;z-index:180;
  transform:translateY(100%);transition:transform .25s;border-radius:12px 12px 0 0;}
#mioSheet.on{transform:translateY(0);}
.sheet-btn{width:100%;padding:11px;border:none;border-radius:8px;font-size:13px;
  font-weight:700;cursor:pointer;margin-bottom:7px;letter-spacing:.5px;}
/* ── Editor sheet ── */
#mEdSheet{position:fixed;bottom:0;left:0;right:0;background:#050a14;
  border-top:1px solid var(--brd);padding:14px;z-index:190;
  max-height:85vh;overflow-y:auto;
  transform:translateY(100%);transition:transform .25s;border-radius:12px 12px 0 0;}
#mEdSheet.on{transform:translateY(0);}
/* ── Toast ── */
#mtoast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--card);color:var(--wh);padding:8px 16px;border-radius:20px;
  font-size:12px;z-index:500;opacity:0;transition:all .3s;pointer-events:none;
  max-width:88vw;text-align:center;border:1px solid var(--brd);}
#mtoast.on{opacity:1;transform:translateX(-50%) translateY(0);}
#mtoast.ok{background:#064e3b;border-color:#10b981;color:#6ee7b7;}
#mtoast.err{background:#450a0a;border-color:#ef4444;color:#fca5a5;}
/* ── Empty ── */
.empty{text-align:center;padding:28px;color:var(--mt);font-size:13px;}
/* ── Birthday pulse ── */
@keyframes bpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,53,.4);}50%{box-shadow:0 0 0 8px rgba(255,107,53,0);}}
.bday-glow{animation:bpulse 1.5s ease-in-out infinite;}
/* ── IAMO abs modal ── */
#mAbsModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:400;
  align-items:flex-end;justify-content:center;}
#mAbsModal.on{display:flex;}
.abs-box{background:var(--card);border-radius:14px 14px 0 0;padding:16px;width:100%;max-width:500px;}
</style>
</head>
<body>

<!-- ══ AUTH ══ -->
<div id="mAuth">
  <div class="authBox">
    <div class="authLogo">⚡ GESTÃO DA AUTOMAÇÃO</div>
    <div class="authSub">MINA DO ANDRADE</div>
    <div class="authLbl">Usuário</div>
    <input id="authUser" type="text" placeholder="usuário" autocapitalize="none" autocomplete="username" style="margin-bottom:10px;">
    <div class="authLbl">Senha</div>
    <input id="authPass" type="password" placeholder="senha" autocomplete="current-password" style="margin-bottom:10px;"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="authBtn" onclick="doLogin()">ENTRAR</button>
    <div id="authErr" class="authErr"></div>
    <details style="margin-top:14px;border-top:1px solid var(--brd);padding-top:10px;">
      <summary style="color:var(--mt);font-size:11px;cursor:pointer;text-align:center;">Solicitar acesso</summary>
      <div style="margin-top:10px;">
        <input id="reqNome" type="text" placeholder="Seu nome completo" autocapitalize="words" style="margin-bottom:6px;">
        <input id="reqMatric" type="text" placeholder="Matrícula (opcional)" style="margin-bottom:6px;">
        <input id="reqMotivo" type="text" placeholder="Função / motivo" style="margin-bottom:6px;">
        <button onclick="enviarSolicitacao()" style="width:100%;background:var(--card);color:var(--bl);
          border:1px solid var(--brd);border-radius:8px;padding:9px;font-size:12px;font-weight:700;cursor:pointer;">
          ✉ ENVIAR POR E-MAIL
        </button>
      </div>
    </details>
  </div>
</div>

<!-- ══ MAIN APP ══ -->
<div id="mApp">

  <!-- HEADER -->
  <div class="mhd">
    <div class="mhd-logo">⚡ MINA DO ANDRADE</div>
    <div id="mFbDot" class="mhd-fb" title="Firebase"></div>
    <button id="mEditBtn" class="mhd-btn" style="display:none;" onclick="mAbrirEditar()">✏</button>
    <button class="mhd-btn" onclick="mToggleIO()">☁</button>
  </div>

  <!-- TICKER -->
  <div id="mTicker" class="mtick" onclick="showPage('seg')">—</div>

  <!-- ══ PAGES ══ -->
  <div id="mpg-kpi" class="mpg on"><div id="mKpiContent"></div></div>

  <div id="mpg-iamo" class="mpg">
    <div style="display:flex;gap:6px;margin-bottom:8px;">
      <select id="iamoMes" onchange="iamoState.month=+this.value;iamoRenderAll();" style="flex:1;font-size:13px;padding:6px;"></select>
      <select id="iamoAno" onchange="iamoState.year=+this.value;iamoRenderAll();" style="width:90px;font-size:13px;padding:6px;"></select>
    </div>
    <div class="stabs">
      <button class="stab on" onclick="mIamoTab(this,'Dash')">Dashboard</button>
      <button class="stab" onclick="mIamoTab(this,'Colab')">Colaboradores</button>
      <button class="stab" onclick="mIamoTab(this,'Upload')">Upload</button>
      <button class="stab" onclick="mIamoTab(this,'Aus')">Ausências</button>
    </div>
    <div id="iamoDash"></div>
    <div id="iamoEquipe" style="display:none;"></div>
    <div id="iamoUpload" style="display:none;">
      <button onclick="document.getElementById('iamoXlsInput').click();"
        style="width:100%;padding:13px;background:#0c2814;border:1px dashed #22c55e;
        border-radius:8px;color:#22c55e;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px;">
        📊 IMPORTAR PLANILHA EXCEL (.xlsx)
      </button>
      <input type="file" id="iamoXlsInput" accept=".xlsx,.xls" style="display:none;"
        onchange="iamoOnExcelFile(this.files[0]);this.value='';">
      <div id="iamoBusy" style="display:none;padding:10px;text-align:center;color:#22c55e;font-size:13px;">
        ⏳ <span id="iamoBusyName"></span>
      </div>
      <div id="iamoFiles"></div>
      <div id="iamoTasks"></div>
    </div>
    <div id="iamoAbs" style="display:none;"></div>
  </div>

  <div id="mpg-equipe" class="mpg"><div id="mEqContent"></div></div>

  <div id="mpg-seg" class="mpg"><div id="mSegContent"></div></div>

  <div id="mpg-mais" class="mpg">
    <div class="stabs">
      <button class="stab on" onclick="mMaisSub(this,'agenda')">Agenda</button>
      <button class="stab" onclick="mMaisSub(this,'trein')">Treinamentos</button>
      <button class="stab" onclick="mMaisSub(this,'ordens')">Ordens</button>
      <button class="stab" onclick="mMaisSub(this,'ipar')">IPAR</button>
      <button class="stab" onclick="mMaisSub(this,'5s')">5S</button>
      <button class="stab" onclick="mMaisSub(this,'corretivas')">Corretivas</button>
      <button class="stab" onclick="mMaisSub(this,'forces')">Forces</button>
    </div>
    <div id="mMaisContent"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="mbnav">
    <button class="mbtn on" id="mnav-kpi" onclick="showPage('kpi')">
      <span class="mbtn-ico">📊</span>KPIs
    </button>
    <button class="mbtn" id="mnav-iamo" onclick="showPage('iamo')">
      <span class="mbtn-ico">⏱</span>IAMO
    </button>
    <button class="mbtn" id="mnav-equipe" onclick="showPage('equipe')">
      <span class="mbtn-ico">👥</span>Equipe
    </button>
    <button class="mbtn" id="mnav-seg" onclick="showPage('seg')">
      <span class="mbtn-ico">🦺</span>Segurança
    </button>
    <button class="mbtn" id="mnav-mais" onclick="showPage('mais')">
      <span class="mbtn-ico">☰</span>Mais
    </button>
  </nav>

  <!-- IO SHEET -->
  <div id="mioSheet">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;">☁ DADOS</div>
      <button onclick="mToggleIO()" style="background:none;border:none;color:var(--mt);font-size:20px;cursor:pointer;">✕</button>
    </div>
    <button class="sheet-btn" style="background:var(--primary);color:#000;" onclick="exportarDados()">⬇ EXPORTAR .json</button>
    <label class="sheet-btn" style="display:block;background:var(--card);color:var(--bl);border:1px solid var(--brd);text-align:center;cursor:pointer;margin-bottom:7px;">
      ⬆ IMPORTAR .json<input type="file" accept=".json" onchange="importarDados(this)" style="display:none;">
    </label>
    <input id="odUrl" type="url" placeholder="URL OneDrive / Google Drive" style="margin-bottom:6px;font-size:12px;">
    <button class="sheet-btn" style="background:var(--card);color:var(--bl);border:1px solid var(--brd);" onclick="odLerAgora()">☁ LER DADOS AGORA</button>
    <div id="ioStatus" style="font-size:11px;color:var(--mt);text-align:center;margin-top:4px;min-height:16px;"></div>
  </div>

  <!-- EDITOR SHEET -->
  <div id="mEdSheet">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div style="font-size:14px;font-weight:700;">✏ EDITAR</div>
      <button onclick="mFecharEditar()" style="background:none;border:none;color:var(--mt);font-size:20px;cursor:pointer;">✕</button>
    </div>
    <div id="mEdContent"></div>
  </div>

  <!-- AUSÊNCIA MODAL -->
  <div id="mAbsModal">
    <div class="abs-box">
      <div style="font-size:15px;font-weight:700;margin-bottom:12px;">+ Registrar Ausência</div>
      <select id="iamoFEmp" style="margin-bottom:8px;"></select>
      <select id="iamoFType" style="margin-bottom:8px;" onchange="iamoState.formType=this.value;">
        <option value="ferias">Férias</option>
        <option value="afastamento">Afastamento</option>
        <option value="folga_comp">Folga Compensatória</option>
        <option value="treinamento">Treinamento</option>
        <option value="desvio">Desvio de Função</option>
      </select>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
        <div><div style="font-size:10px;color:var(--mt);margin-bottom:3px;">Início</div>
          <input type="date" id="iamoFIni" onchange="iamoCalcDias()"></div>
        <div><div style="font-size:10px;color:var(--mt);margin-bottom:3px;">Término</div>
          <input type="date" id="iamoFFim" onchange="iamoCalcDias()"></div>
      </div>
      <div id="iamoDDias" style="display:none;font-size:12px;color:#22c55e;margin-bottom:8px;"></div>
      <input type="text" id="iamoFObs" placeholder="Observações (opcional)" style="margin-bottom:12px;">
      <div style="display:flex;gap:8px;">
        <button onclick="iamoSalvarAusencia()" style="flex:1;background:var(--primary);color:#000;border:none;border-radius:8px;padding:11px;font-weight:700;cursor:pointer;">SALVAR</button>
        <button onclick="document.getElementById('mAbsModal').classList.remove('on')" style="flex:1;background:var(--brd);color:var(--wh);border:none;border-radius:8px;padding:11px;font-weight:700;cursor:pointer;">CANCELAR</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="mtoast"></div>

</div><!-- #mApp -->

var currentUser   = null;
var firebaseDB    = null;
var firebaseReady = false;

function initFirebase(){
  if(FIREBASE_CONFIG.apiKey === 'COLE_AQUI'){
    console.warn('[GDA] Firebase nao configurado - usando apenas usuarios fixos.');
    return;
  }
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    firebaseDB = firebase.database();
    /* Conexao direta — regras do banco permitem acesso publico (read/write:true).
       NAO depende de signInAnonymously para evitar falha silenciosa de sync. */
    firebaseReady = true;
    console.log('[GDA] Firebase conectado (sem auth anonima).');
    var dot = document.getElementById('fbSyncDot');
    if(dot){ dot.style.opacity='0.4'; dot.title='Firebase conectado'; }
    /* Pull inicial de dados + IAMO + listeners em tempo real */
    Promise.all([
      firebaseDB.ref('gda_data').once('value'),
      firebaseDB.ref('gda_iamo').once('value')
    ]).then(function(snaps){
      var savedData=snaps[0].val();
      if(savedData&&typeof savedData==='object'){
        deepMerge(D,savedData);
        try{localStorage.setItem(LS_KEY,JSON.stringify(D));}catch(e){}
        reRenderAll();
      }
      var savedIamo=snaps[1].val();
      if(savedIamo&&typeof savedIamo==='object'){
        if(savedIamo.tasks)iamoState.tasks=savedIamo.tasks;
        if(savedIamo.files)iamoState.files=savedIamo.files;
        if(savedIamo.absences)iamoState.absences=savedIamo.absences;
        if(savedIamo.year)iamoState.year=savedIamo.year;
        if(savedIamo.month)iamoState.month=savedIamo.month;
        try{localStorage.setItem(IAMO_STORAGE,JSON.stringify(savedIamo));}catch(e){}
        try{iamoRenderAll();}catch(e){}
      }
      iniciarSyncFirebase();
    }).catch(function(e){
      console.warn('[GDA] Pull inicial falhou, ativando listeners mesmo assim:', e.message);
      iniciarSyncFirebase();
    });
  }catch(e){
    console.warn('[GDA] Erro Firebase:', e.message);
  }
}

function GDA_hashPassword(p){
  return crypto.subtle.digest('SHA-256', new TextEncoder().encode(p)).then(function(buf){
    return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  });
}

function gerarSenhaAuto(displayName){
  var prefix = (displayName||'User').split(' ')[0].replace(/[^a-zA-Z]/g,'').slice(0,6) || 'User';
  return prefix + '#' + Math.floor(1000 + Math.random()*9000);
}

function getFirebaseUsers(){
  if(!firebaseReady) return Promise.resolve([]);
  return firebaseDB.ref('gda_users').once('value').then(function(snap){
    var data = snap.val() || {};
    return Object.values(data);
  }).catch(function(){ return []; });
}

function getAllUsers(){
  return getFirebaseUsers().then(function(dyn){
    return AUTH_USERS_BASE.concat(dyn);
  });
}

function doLogin(){
  var username = (document.getElementById('authUser').value||'').trim().toLowerCase();
  var password  = document.getElementById('authPass').value||'';
  var errEl     = document.getElementById('authErr');
  errEl.style.display = 'none';
  if(!username||!password){
    errEl.style.display='block'; errEl.style.color='var(--rd)';
    errEl.textContent='Preencha usuario e senha.'; return;
  }
  errEl.style.display='block'; errEl.style.color='var(--mt)';
  errEl.textContent='Verificando...';

  GDA_hashPassword(password).then(function(hash){
    /* 1. Check base users first (always works, no Firebase needed) */
    var baseUser = AUTH_USERS_BASE.find(function(u){ return u.username===username && u.passwordHash===hash; });
    if(baseUser){
      _loginSuccess(baseUser);
      return;
    }
    /* 2. Check dynamic Firebase users (only if Firebase is ready) */
    if(firebaseReady){
      getFirebaseUsers().then(function(dynUsers){
        var dynUser = dynUsers.find(function(u){ return u.username===username && u.passwordHash===hash; });
        if(dynUser){
          _loginSuccess(dynUser);
        }else{
          _loginFail(errEl);
        }
      }).catch(function(){
        /* Firebase read failed - only base users available */
        _loginFail(errEl);
      });
    } else {
      /* Firebase not ready yet - check localStorage dynamic users as fallback */
      var dyn=[]; try{dyn=JSON.parse(localStorage.getItem('gda_dyn_users'))||[];}catch(e){}
      var dynUser = dyn.find(function(u){ return u.username===username && u.passwordHash===hash; });
      if(dynUser){
        _loginSuccess(dynUser);
      }else{
        _loginFail(errEl);
      }
    }
  });
}

function _loginSuccess(user){
  currentUser = { username:user.username, isAdmin:user.isAdmin, displayName:user.displayName };
  try{ sessionStorage.setItem(AUTH_SESSION_KEY, JSON.stringify(currentUser)); }catch(e){}
  document.getElementById('authOverlay').style.display = 'none';
  applyAuthUI();
}

function _loginFail(errEl){
  errEl.style.color='var(--rd)'; errEl.textContent='Usuario ou senha incorretos.';
  document.getElementById('authPass').value = '';
  document.getElementById('authPass').focus();
}

function applyAuthUI(){

    chip.style.display = 'flex'; chip.style.alignItems = 'center';

}

function confirmLogout(){

}

function doLogout(){
  try{ sessionStorage.removeItem(AUTH_SESSION_KEY); }catch(e){}
  currentUser = null;
  document.getElementById('authOverlay').style.display = 'flex';
  document.getElementById('userChip').style.display = 'none';

function checkSession(){
  processarUrlRequest();
  try{
    var s = sessionStorage.getItem(AUTH_SESSION_KEY);
    if(s){
      var u = JSON.parse(s);
      if(u && u.username){
        /* Validate against base users immediately - no Firebase wait */
        var valid = AUTH_USERS_BASE.find(function(a){ return a.username===u.username; });
        /* For dynamic users, trust session (Firebase will validate on next explicit login) */
        if(valid || u.username){
          currentUser = u;
          document.getElementById('authOverlay').style.display = 'none';
          applyAuthUI();
          return;
        }
      }
    }
  }catch(e){}
}

/* -- SOLICITACOES DE ACESSO -- */
function getPendingReqs(){ try{ return JSON.parse(localStorage.getItem(PENDING_REQ_KEY))||[]; }catch(e){ return []; } }
function savePendingReqs(l){ try{ localStorage.setItem(PENDING_REQ_KEY, JSON.stringify(l)); }catch(e){} }

function processarUrlRequest(){
  try{
    var req = new URLSearchParams(window.location.search).get('req');
    if(!req) return;
    var data = JSON.parse(decodeURIComponent(escape(atob(req))));
    if(!data.nome) return;
    var pending = getPendingReqs();
    if(!pending.some(function(p){ return p.nome===data.nome && p.ts===data.ts; })){
      data.id = Date.now().toString(36) + Math.random().toString(36).slice(2,5);
      pending.push(data);
      savePendingReqs(pending);
    }
    window.history.replaceState({}, '', window.location.pathname);
    setTimeout(function(){ toast('Nova solicitacao de ' + data.nome + '!', true); }, 800);
  }catch(e){}
}

function atualizarBadgePendentes(){
  var n     = getPendingReqs().length;
  var badge = document.getElementById('editBadge');
  if(!badge) return;
  if(n > 0 && currentUser && currentUser.isAdmin){
    badge.style.display = 'inline'; badge.textContent = n;
  }else{
    badge.style.display = 'none';
  }
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function iniciarAprovacao(id, nome){
  document.querySelectorAll('.apr-form').forEach(function(f){ f.classList.remove('open'); });
  var form = document.getElementById('aprForm_' + id);
  if(form) form.classList.add('open');
}

function rejeitarReq(id){
  if(!confirm('Rejeitar esta solicitacao?')) return;
  savePendingReqs(getPendingReqs().filter(function(r){ return r.id !== id; }));
  renderUsuariosEditor();
  toast('Solicitacao rejeitada.', false);
}

function confirmarAprovacao(id, displayName){
  var userInp = document.getElementById('apr_user_' + id);
  var roleInp = document.getElementById('apr_role_' + id);
  var username = (userInp ? userInp.value : '').trim().toLowerCase();
  var isAdmin  = roleInp ? roleInp.value === 'true' : false;
  if(!username){ alert('Defina o login.'); return; }

  getAllUsers().then(function(allUsers){
    if(allUsers.find(function(u){ return u.username === username; })){
      alert('Login "' + username + '" ja existe. Escolha outro.'); return;
    }
    var senha   = gerarSenhaAuto(displayName);
    GDA_hashPassword(senha).then(function(hash){
      var newUser = { username:username, passwordHash:hash, isAdmin:isAdmin, displayName:displayName||username };

      var savePromise;
      if(firebaseReady){
        savePromise = firebaseDB.ref('gda_users/' + username).set(newUser);
      }else{
        var dyn = []; try{ dyn = JSON.parse(localStorage.getItem('gda_dyn_users'))||[]; }catch(e){}
        dyn.push(newUser);
        localStorage.setItem('gda_dyn_users', JSON.stringify(dyn));
        savePromise = Promise.resolve();
        toast('Firebase nao configurado - usuario salvo so neste dispositivo.', false);
      }

      savePromise.then(function(){
        savePendingReqs(getPendingReqs().filter(function(r){ return r.id !== id; }));

        var resultEl = document.getElementById('aprResult_' + id);
        if(resultEl){
          resultEl.style.display = 'block';
          var title = document.createElement('div');
          title.style.cssText = 'font-family:var(--fh);font-size:24px;font-weight:700;color:var(--gn);margin-bottom:8px;';
          title.textContent = 'Aprovado! Repasse as credenciais:';
          resultEl.appendChild(title);

          var creds = document.createElement('div');
          creds.style.cssText = 'font-family:var(--fm);font-size:23px;color:#ccc;line-height:1.8;';
          creds.innerHTML = 'Login: <b style="color:var(--or);">' + esc(username) + '</b><br>Senha: <b style="color:var(--or);">' + esc(senha) + '</b>';
          resultEl.appendChild(creds);

          var cpBtn = document.createElement('button');
          cpBtn.style.cssText = 'margin-top:8px;font-family:var(--fh);font-size:22px;font-weight:700;padding:6px 14px;border-radius:3px;background:var(--bl);color:#000;border:none;cursor:pointer;';
          cpBtn.textContent = 'COPIAR CREDENCIAIS';
          var textoCopiar = 'Login: ' + username + ' - Senha: ' + senha;
          cpBtn.onclick = function(){ navigator.clipboard.writeText(textoCopiar).then(function(){ toast('Copiado!', true); }); };
          resultEl.appendChild(cpBtn);
        }

        var form = document.getElementById('aprForm_' + id);
        if(form) form.classList.remove('open');
        toast(displayName + ' aprovado! Ja pode fazer login em qualquer dispositivo.', true);
        atualizarBadgePendentes();
      });
    });
  });
}

function removerUsuarioFB(username){
  if(!confirm('Remover usuario "' + username + '"?')) return;
  var done = firebaseReady
    ? firebaseDB.ref('gda_users/' + username).remove()
    : Promise.resolve().then(function(){
        var dyn=[]; try{ dyn=JSON.parse(localStorage.getItem('gda_dyn_users'))||[]; }catch(e){}
        localStorage.setItem('gda_dyn_users', JSON.stringify(dyn.filter(function(u){ return u.username!==username; })));
      });
  done.then(function(){ renderUsuariosEditor(); toast('Usuario removido.', false); });
}

var _origEdGoTab = null;
function hookEdGoTab(){
  if(typeof edGoTab === 'function' && !_origEdGoTab){
    _origEdGoTab = edGoTab;
    edGoTab = function(i){ _origEdGoTab(i); if(i === 8) renderUsuariosEditor(); };
  }
}

/* Find responsible for equipment */
function findResp(equip){
  if(!equip)return'';
  var q=equip.toUpperCase().trim();
  for(var i=0;i<EQUIP_LOOKUP.length;i++){
    if(q.indexOf(EQUIP_LOOKUP[i].equip.toUpperCase())>=0)return EQUIP_LOOKUP[i].resp;
  }
  return'';
}

function calcProximaTroca(desc,dataEntrega){
  if(!dataEntrega)return'';
  var meses=EPI_PERIOD[(desc||'').toUpperCase().trim()];
  if(!meses)return'';
  var p=dataEntrega.split('/').map(Number);
  if(p.length<3)return'';
  var dt=new Date(p[2],p[1]-1,p[0]);
  dt.setMonth(dt.getMonth()+meses);
  return String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0')+'/'+dt.getFullYear();
}

      var match=EQUIP_LOOKUP.filter(function(e){return e.equip.toLowerCase()===eqInp.value.toLowerCase()&&e.disc===disc;});
      respInp.value=match.length?match[0].resp:'';

  });

  var discSel=document.getElementById('cr_disc');
  if(discSel)discSel.addEventListener('change',function(){
    var respInp=document.getElementById('cr_resp');

function parseDate(s){if(!s)return null;var p=s.split('/').map(Number);if(p.length<3)return null;return new Date(p[2],p[1]-1,p[0]);}
function diasAte(s){if(!s)return null;var h=new Date();h.setHours(0,0,0,0);var d=parseDate(s);if(!d)return null;return Math.round((d-h)/(1000*60*60*24));}
function kC(v,m){if(v>=m)return'var(--gn)';var p=(v-m)/m*100;return p>=-5?'var(--yw)':p>=-15?'var(--or)':'var(--rd)';}
function parseKpiNum(s){if(!s||s==='—'||s==='-')return null;return parseFloat(s.replace(',','.').replace('%','').trim())||null;}
function subColor(v){var n=parseFloat(v.replace(',','.').replace('%',''));if(isNaN(n))return'cor';if(n>=95)return'cgn';if(n>=80)return'cy';if(n>=60)return'cor';return'crd';}

function deepMerge(target,saved){
  if(!saved||typeof saved!=='object')return;
  var ALWAYS_MERGE=['iamoTeam','corretivas','calibracoes','conquistas'];
  Object.keys(saved).forEach(function(k){
    /* ALWAYS_MERGE ou array → atribuição direta */
    if(ALWAYS_MERGE.indexOf(k)>=0||Array.isArray(saved[k])){
      target[k]=saved[k];
    /* Objeto não-null → recursão (cria target[k] se não existir) */
    } else if(saved[k]!==null&&typeof saved[k]==='object'){
      if(!target[k]||typeof target[k]!=='object')target[k]={};
      deepMerge(target[k],saved[k]);
    /* Primitivo (string, number, boolean, null) → atribuição direta */
    } else {
      target[k]=saved[k];
    }
  });
}
function carregarDados(){
  try{
    var raw=localStorage.getItem(LS_KEY);
    if(!raw){for(var i=0;i<LS_LEGACY.length;i++){raw=localStorage.getItem(LS_LEGACY[i]);if(raw){localStorage.setItem(LS_KEY,raw);localStorage.removeItem(LS_LEGACY[i]);break;}}}
    if(!raw)return;
    deepMerge(D,JSON.parse(raw));
  }catch(e){}
}

/* ── EPI RENDER ── */
var epiCurrentFilter='todos';
function epiFilterSet(f){
  epiCurrentFilter=f;
  document.querySelectorAll('.epi-fbtn').forEach(function(b){b.classList.toggle('active',b.textContent.toLowerCase().includes(f==='todos'?'todos':f==='vencendo'?'vencendo':'vencido'));});
  renderEpi();
}
function epiVencClass(d){if(!d)return'nd';var v=diasAte(d);if(v===null)return'nd';if(v<0)return'crit';if(v<=60)return'soon';return'ok';}
function epiVencLabel(d){if(!d)return'S/D';var v=diasAte(d);if(v===null)return'S/D';if(v<0)return Math.abs(v)+'d VENC';if(v===0)return'HOJE';return d.slice(0,10);}
function renderEpi(){
  var el=document.getElementById('EPI_LIST');if(!el)return;
  var grupos={};
  D.epi.forEach(function(e){if(!grupos[e.pessoa])grupos[e.pessoa]=[];grupos[e.pessoa].push(e);});
  function pf(e){
    var ve=epiVencClass(e.validEpi);
    var pTroca=e.proximaTroca||calcProximaTroca(e.desc,e.dataEntrega);
    var vt=epiVencClass(pTroca);
    if(epiCurrentFilter==='todos')return true;
    if(epiCurrentFilter==='vencido')return ve==='crit'||vt==='crit';
    if(epiCurrentFilter==='vencendo')return ve==='soon'||vt==='soon';
    return true;
  }
  var out='<div style="display:flex;gap:10px;padding:4px 4px 8px;border-bottom:1px solid var(--border);margin-bottom:4px;">'
    +'<div style="font-size:12px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;min-width:100px;text-align:center;">PRX. TROCA</div>'
    +'<div style="font-size:12px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;">DESCRIÇÃO · DATAS · RESPONSÁVEL</div>'
    +'</div>';
  Object.keys(grupos).forEach(function(pessoa){
    var itens=grupos[pessoa].filter(pf);if(!itens.length)return;
    out+='<div class="epi-pessoa">'+pessoa+'</div>';
    itens.forEach(function(e){
      var vcCls=epiVencClass(e.validCa),veCls=epiVencClass(e.validEpi);
      var pTroca=e.proximaTroca||calcProximaTroca(e.desc,e.dataEntrega);
      var vtCls=epiVencClass(pTroca);
      out+='<div style="display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid var(--border);">'
        +'<div class="epi-venc '+vtCls+'" style="min-width:100px;text-align:center;font-size:13px;">'+epiVencLabel(pTroca)+'</div>'
        +'<div style="flex:1;min-width:0;">'
        +'<div style="font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+e.desc+'</div>'
        +'<div style="font-size:12px;color:var(--text-secondary);margin-top:3px;">'
        +(e.dataEntrega?'Entrega: '+e.dataEntrega.slice(0,10)+' &nbsp;':'')
        +(e.validEpi?'Val.EPI: <span style="color:'+(epiVencClass(e.validEpi)==='crit'?'var(--danger)':epiVencClass(e.validEpi)==='soon'?'var(--warning)':'var(--success)')+';">'+e.validEpi.slice(0,10)+'</span> &nbsp;':'')
        +(e.validCa?'Val.CA: '+e.validCa.slice(0,10)+' &nbsp;':'')
        +(e.ca?'CA#'+e.ca+' &nbsp;':'')
        +(e.responsavel?'👤'+e.responsavel:'')
        +'</div></div></div>';

  (D.senso.acoes||[]).filter(function(a){return!a.concluida;}).forEach(function(a){if(!a.prazo)return;var d=diasAte(a.prazo);if(d===null||d>14)return;items.push({x:('5S: '+a.acao).toUpperCase(),t:'5S',d:d});});
  (D.procedimentos||[]).forEach(function(p){if(!p.dataVenc)return;var d=diasAte(p.dataVenc);if(d===null||d>60)return;items.push({x:('PROC: '+p.codigo+' – '+p.descricao).toUpperCase(),t:'CAL',d:d});});

function applyKpiColors(pid,kpi){
  var el=document.getElementById(pid);

  if(v!==null&&m!==null){c=kC(v,m);pct=Math.min(100,Math.round(v));}
  else if(v!==null){c=kC(v,100);pct=Math.min(100,Math.round(v));} /* sem meta: usa valor direto como % */

/* ── 5S ── */
function calcSensoScore(avs){
  /* Group by timestamp (each evaluation session = same ts) */
  if(!avs||!avs.length) return null;
  /* Get the most recent evaluation session for this area */
  var lastTs=avs.reduce(function(mx,a){return Math.max(mx,a.ts||0);},0);
  var session=avs.filter(function(a){return a.ts===lastTs;});
  if(!session.length) session=avs.slice(-1);
  /* Support both old (1-5 scale with .score) and new (0-4 scale per question) */
  if(session[0].score!==undefined){
    /* Old format: score already computed */
    return{pct:session[0].score,mat:session[0].score>=95?4:session[0].score>=70?3:session[0].score>=50?2:session[0].score>=40?1:0,ts:lastTs};
  }
  /* New format: nota 0-4 per question */
  var soma=session.reduce(function(s,a){return s+(Number(a.nota)||0);},0);
  var maxPoss=session.length*4;
  var pct=maxPoss?Math.round(soma/maxPoss*100):0;
  var mat=pct>95?4:pct>70?3:pct>50?2:pct>40?1:0;
  return{pct:pct,mat:mat,ts:lastTs,resp:session[0]?session[0].responsavel:'',data:session[0]?session[0].data:''};
}

function calcSensoColor(pct){
  /* Return actual hex so we can safely append alpha suffix for backgrounds */
  return pct>=95?'#0095ff':pct>=70?'#00d68f':pct>=50?'#ffaa00':pct>=40?'#ff6b35':'#ff3d71';
}

var MAT_LABELS=['Inexistente','Fraco','Em Implant.','Implantado','Excelência'];

function renderSensoGrid(){
  var el=document.getElementById('sensoGridEl');if(!el)return;
  if(!D.senso.avaliacoes||!D.senso.avaliacoes.length){
    el.innerHTML='<div class="sensoGrid">'+D.senso.areas.map(function(a){
      return'<div class="sensoCard" style="border:2px solid #2a3446;"><div class="sensoNm">'+a.nome+'</div>'+(a.dono?'<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px;">👤 '+a.dono+'</div>':'')+'<div class="sensoVal" style="color:var(--text-secondary);">—</div><div style="font-size:11px;color:var(--text-secondary);margin-top:4px;">Sem avaliação</div></div>';
    }).join('')+'</div>';
    return;
  }
  el.innerHTML='<div class="sensoGrid">'+D.senso.areas.map(function(a){
    var avs=D.senso.avaliacoes.filter(function(av){return av.areaId===a.id;});
    if(!avs.length)return'<div class="sensoCard" style="border:2px solid #2a3446;"><div class="sensoNm">'+a.nome+'</div>'+(a.dono?'<div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px;">👤 '+a.dono+'</div>':'')+'<div class="sensoVal" style="color:var(--text-secondary);">—</div><div style="font-size:11px;color:var(--text-secondary);margin-top:4px;">Sem avaliação</div></div>';
    var sc=calcSensoScore(avs);

  var lista=D.corretivas.filter(function(c){

    if(q&&c.equip.toLowerCase().indexOf(q)<0&&c.resp.toLowerCase().indexOf(q)<0&&(c.descr||'').toLowerCase().indexOf(q)<0)return false;

    return true;
  });
  renderCorrSummary(lista);
  if(!lista.length){el.innerHTML='<div style="font-size:27px;color:var(--mt);padding:8px;">Nenhuma corretiva encontrada.</div>';return;}
  var dm={INST:'inst',AUTO:'auto',REDES:'redes'};

  }).join('');

function renderCorrSummary(lista){
  var el=document.getElementById('corrSummary');if(!el)return;
  var totais={AUTO:0,INST:0,REDES:0};
  lista.forEach(function(c){
    if(!c.tempo)return;
    var minutos=0;
    var partes=c.tempo.trim().split(/\s+/);
    for(var i=0;i<partes.length;i++){
      if(partes[i].match(/^\d+$/)){
        if(partes[i+1]&&partes[i+1].toLowerCase().startsWith('h')){minutos+=parseInt(partes[i])*60;}
        else if(partes[i+1]&&partes[i+1].toLowerCase().startsWith('m')){minutos+=parseInt(partes[i]);}
      }
    }
    var disc=c.disc||'AUTO';
    if(!totais[disc])totais[disc]=0;
    totais[disc]+=minutos;
  });
  var formatTempo=function(min){
    if(min===0)return'0 min';
    var h=Math.floor(min/60);
    var m=min%60;
    if(h>0&&m>0)return h+'h '+m+'min';
    if(h>0)return h+'h';
    return m+'min';
  };
  el.innerHTML='<div class="corr-sum-card auto"><div class="corr-sum-label">Automação</div><div class="corr-sum-value">'+formatTempo(totais.AUTO)+'</div></div>'
    +'<div class="corr-sum-card inst"><div class="corr-sum-label">Instrumentation</div><div class="corr-sum-value">'+formatTempo(totais.INST)+'</div></div>'
    +'<div class="corr-sum-card redes"><div class="corr-sum-label">Redes</div><div class="corr-sum-value">'+formatTempo(totais.REDES)+'</div></div>';
}

  var q=(document.getElementById('equipSearch')||{}).value||'';q=q.toLowerCase().trim();
  if(!q){el.innerHTML='<div style="font-size:25px;color:var(--mt);padding:8px;">Digite o TAG para pesquisar.</div>';return;}
  var results=EQUIP_LOOKUP.filter(function(e){return e.equip.toLowerCase().indexOf(q)>=0;});
  if(!results.length){el.innerHTML='<div style="font-size:25px;color:var(--mt);padding:8px;">Nenhum equipamento encontrado.</div>';return;}
  var dm={INST:'inst',AUTO:'auto',REDES:'redes'};
  el.innerHTML=results.map(function(e){return'<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #1a1a22;"><span class="corr-disc '+(dm[e.disc]||'auto')+'">'+e.disc+'</span><span style="font-family:var(--fm);font-size:25px;color:var(--or2);flex:1;">'+e.equip+'</span><span style="font-size:25px;color:#ccc;">👤 '+e.resp+'</span></div>';}).join('');

function addAgenda(){
  var wd=document.getElementById('ag_wd').value.trim(),
      d=document.getElementById('ag_d').value.trim(),
      d2=(document.getElementById('ag_d2')||{}).value||'',
      type=document.getElementById('ag_type').value,
      desc=document.getElementById('ag_desc').value.trim(),
      who=document.getElementById('ag_who').value.trim();
  if(!desc){toast('Preencha a descricao!',false);return;}
  if(d2.trim()){
    /* Multi-day: generate one entry per day */
    function parseDD(str){var p=str.split('/');return{d:parseInt(p[0]),m:parseInt(p[1])};}
    var DIAS=['DOM','SEG','TER','QUA','QUI','SEX','SAB'];
    try{
      var s=parseDD(d),e=parseDD(d2),ano=new Date().getFullYear();
      var start=new Date(ano,s.m-1,s.d),end=new Date(ano,e.m-1,e.d);
      if(end<start)end.setFullYear(ano+1);
      var cur=new Date(start);
      while(cur<=end){
        if(cur.getDay()%6!==0){/* skip weekends */
          var dd=String(cur.getDate()).padStart(2,'0')+'/'+String(cur.getMonth()+1).padStart(2,'0');
          D.agenda.push({wd:DIAS[cur.getDay()],d:dd,type:type,desc:desc,who:who});
        }
        cur.setDate(cur.getDate()+1);
      }
    }catch(ex){D.agenda.push({wd:wd,d:d,type:type,desc:desc,who:who});}
  } else {
    D.agenda.push({wd:wd,d:d,type:type,desc:desc,who:who});
  }
  renderAgendaEditor();reRenderAgendaView();salvarDados();toast('Evento adicionado!');
}

function iamoAddMember(){
  var name=(document.getElementById('iamo_new_name').value||'').trim();
  var short=(document.getElementById('iamo_new_short').value||'').trim();
  var disc=document.getElementById('iamo_new_disc').value;
  var aliasesRaw=(document.getElementById('iamo_new_aliases').value||'').trim();
  if(!name){toast('Preencha o nome completo!',false);return;}
  if(!short) short=name.split(' ')[0];
  var id=name.toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/__+/g,'_');
  var aliases=aliasesRaw?aliasesRaw.split(',').map(function(a){return a.trim();}).filter(Boolean):[name,short];
  if(aliases.indexOf(name)<0) aliases.unshift(name);
  if(!IAMO_TEAM[disc]) IAMO_TEAM[disc]=[];
  /* Check duplicate */
  if(IAMO_TEAM[disc].some(function(e){return e.id===id;})){
    toast('Membro já existe nessa disciplina!',false);return;
  }
  IAMO_TEAM[disc].push({id:id,name:name,short:short,aliases:aliases});
  /* Rebuild IAMO_ALL */
  rebuildIamoAll();
  /* Save to D so it persists via Firebase */
  if(!D.iamoTeam) D.iamoTeam={};
  D.iamoTeam=JSON.parse(JSON.stringify(IAMO_TEAM));
  salvarDados();
  /* Clear inputs */
  document.getElementById('iamo_new_name').value='';
  document.getElementById('iamo_new_short').value='';
  document.getElementById('iamo_new_aliases').value='';
  renderIamoEquipeEditor();
  try{iamoRenderAll();}catch(e){}
  toast('✓ '+name+' adicionado à equipe IAMO!');
}

function iamoRemoveMember2(id,disc){
  if(!confirm('Remover membro da equipe IAMO?')) return;
  if(IAMO_TEAM[disc]){
    IAMO_TEAM[disc]=IAMO_TEAM[disc].filter(function(e){return e.id!==id;});
  }
  rebuildIamoAll();
  if(!D.iamoTeam) D.iamoTeam={};
  D.iamoTeam=JSON.parse(JSON.stringify(IAMO_TEAM));
  salvarDados();
  renderIamoEquipeEditor();
  try{iamoRenderAll();}catch(e){}
  toast('Membro removido da equipe IAMO.');
}

function rebuildIamoAll(){
  IAMO_ALL.length=0;
  Object.keys(IAMO_TEAM).forEach(function(d){
    IAMO_TEAM[d].forEach(function(e){
      IAMO_ALL.push(Object.assign({},e,{discipline:d}));
    });
  });
}

function removeEquipeMembro(i){
  var nome=D.equipe[i].nome;
  if(!confirm('Remover '+nome+' da equipe? Isso também removerá seus registros de EPI, Treinamentos e Rank de Segurança.'))return;
  D.equipe.splice(i,1);
  D.rank=D.rank.filter(function(r){return r.n!==nome;});
  D.epi=D.epi.filter(function(e){return e.pessoa!==nome;});
  D.trein=D.trein.filter(function(t){return t.p!==nome;});
  Object.keys(IAMO_TEAM).forEach(function(d){IAMO_TEAM[d]=IAMO_TEAM[d].filter(function(e){return e.name!==nome;});});
  IAMO_ALL.length=0;
  Object.keys(IAMO_TEAM).forEach(function(d){IAMO_TEAM[d].forEach(function(e){IAMO_ALL.push(Object.assign({},e,{discipline:d}));});});
  if(!D.iamoTeam)D.iamoTeam={};
  D.iamoTeam=JSON.parse(JSON.stringify(IAMO_TEAM));
  buildEqBase();reRenderRankView();reRenderTreinView();renderEpi();reRenderSeguranca();renderEquipeEditor();salvarDados();
  toast('\u2713 '+nome+' removido(a) da equipe e das abas relacionadas.');
}
function addEquipeMembro(){
  var nome=document.getElementById('eq_new_nome').value.trim();
  var ini=document.getElementById('eq_new_ini').value.trim();
  var func=document.getElementById('eq_new_func').value.trim();
  var disc=document.getElementById('eq_new_disc').value.trim();
  var pn=document.getElementById('eq_new_pn').value.trim();
  var bday=document.getElementById('eq_new_bday').value.trim();
  if(!nome){toast('Preencha o nome completo!',false);return;}
  if(!ini)ini=(nome||'').slice(0,2).toUpperCase();
  D.equipe.push({ini:ini,nome:nome,func:func||'Técnico',disciplina:disc,pn:pn,banco:'',ferias:'',kaizens:0,bday:bday});
  if(!D.rank.some(function(r){return r.n===nome;}))D.rank.push({n:nome,s:[0,0,0]});
  if(disc){
    var discKey=Object.keys(IAMO_TEAM).find(function(k){return k.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')===disc.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');});
    if(!discKey){IAMO_TEAM[disc]=[];discKey=disc;}
    var id=nome.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'_').replace(/[^a-z_]/g,'');
    if(!IAMO_TEAM[discKey].some(function(e){return e.id===id;})){
      var firstName=nome.split(' ')[0];
      IAMO_TEAM[discKey].push({id:id,name:nome,short:firstName,aliases:[nome,firstName]});
    }
    IAMO_ALL.length=0;
    Object.keys(IAMO_TEAM).forEach(function(d){IAMO_TEAM[d].forEach(function(e){IAMO_ALL.push(Object.assign({},e,{discipline:d}));});});
    if(!D.iamoTeam)D.iamoTeam={};
    D.iamoTeam=JSON.parse(JSON.stringify(IAMO_TEAM));
  }
  ['eq_new_nome','eq_new_ini','eq_new_func','eq_new_pn','eq_new_bday'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
  buildEqBase();reRenderRankView();reRenderSeguranca();renderEquipeEditor();salvarDados();
  toast('\u2713 '+nome+' adicionado(a) à equipe!');
}

function iamoGetHolidays(){var hDays=new Set();iamoState.absences.filter(function(a){return a.type==='feriado';}).forEach(function(a){var wds=iamoGetWDsRaw(a.s,a.e);wds.forEach(function(d){hDays.add(d);});});return hDays;}
function iamoGetWDsRaw(s,e){var days=[],end=new Date(e+"T12:00:00Z"),d=new Date(s+"T12:00:00Z");while(d<=end){if(d.getUTCDay()%6!==0)days.push(d.toISOString().split("T")[0]);d.setDate(d.getDate()+1);}return days;}
function iamoGetWDs(s,e,ignoreHolidays){var raw=iamoGetWDsRaw(s,e);if(ignoreHolidays)return raw;var hols=iamoGetHolidays();return raw.filter(function(d){return!hols.has(d);});}
function iamoMRange(y,m){
  /* Guard: month=0 means 'all months' - return full year range */
  if(!m||m===0){
    var today0=new Date();
    var todayS0=today0.getFullYear()+'-'+String(today0.getMonth()+1).padStart(2,'0')+'-'+String(today0.getDate()).padStart(2,'0');
    var yearEnd0=y===today0.getFullYear()?todayS0:y+'-12-31';
    return{s:y+'-01-01',e:yearEnd0,full:y+'-12-31'};
  }
  var p=function(v){return String(v).padStart(2,"0");};
  var lastDay=new Date(y,m,0).getDate();
  var today=new Date();
  var todayStr=today.getFullYear()+"-"+p(today.getMonth()+1)+"-"+p(today.getDate());
  var endOfMonth=y+"-"+p(m)+"-"+lastDay;
  /* If current year/month, cap at today */
  var e=(y===today.getFullYear()&&m===today.getMonth()+1)?Math.min(endOfMonth,todayStr)<endOfMonth?Math.min(endOfMonth,todayStr):endOfMonth:endOfMonth;
  /* simpler: */
  var monthEnd=y+"-"+p(m)+"-"+lastDay;
  var cap=(y===today.getFullYear()&&m===(today.getMonth()+1))?todayStr:monthEnd;
  if(cap>monthEnd)cap=monthEnd;
  return{s:y+"-"+p(m)+"-01",e:cap,full:monthEnd};
}
function iamoPct(a,b){return b?Math.min(100,(a/b)*100):0;}
function iamoGc(p){return p>=80?"#10b981":p>=60?"#f59e0b":"#ef4444";}

function iamoCalcEmp(){
  var mr=iamoMRange(iamoState.year,iamoState.month);
  var today=new Date();var todayISO=today.getFullYear()+"-"+String(today.getMonth()+1).padStart(2,"0")+"-"+String(today.getDate()).padStart(2,"0");
  var yr={s:iamoState.year+"-01-01",e:iamoState.year===today.getFullYear()?todayISO:iamoState.year+"-12-31"};
  var mWD=iamoGetWDs(mr.s,mr.e).length,yWD=iamoGetWDs(yr.s,yr.e).length;
  return IAMO_ALL.map(function(emp){
    function calc(r,wd){
      var fe=iamoCntAbs(emp.id,r.s,r.e,["ferias"]),af=iamoCntAbs(emp.id,r.s,r.e,["afastamento"]),fo=iamoCntAbs(emp.id,r.s,r.e,["folga_comp"]),tr=iamoCntAbs(emp.id,r.s,r.e,["treinamento"]);
      /* Desvio: remove esses dias do universo – não somam nem reduzem % */
      var dv=iamoCntAbs(emp.id,r.s,r.e,["desvio"]);
      var dvSet=new Set(iamoState.absences.filter(function(a){return a.empId===emp.id&&a.type==="desvio";}).reduce(function(acc,a){return acc.concat(iamoGetWDs(a.s,a.e).filter(function(d){return d>=r.s&&d<=r.e;}));},[]));
      var wd2=wd-dv;
      var tot=wd2*8,av=Math.max(0,(wd2-(fe+af+fo)-tr)*8);
      var wdSet=new Set(iamoGetWDs(r.s,r.e));
      var pr=iamoState.tasks.filter(function(t){return t.empId===emp.id&&t.date>=r.s&&t.date<=r.e&&wdSet.has(t.date)&&!dvSet.has(t.date);}).reduce(function(s,t){return s+t.minutes/60;},0);
      return{totH:tot,absH:af*8,feH:fe*8,foH:fo*8,trH:tr*8,dvH:dv*8,avH:av,prH:pr,iamo:iamoPct(pr,av)};
    }
    return Object.assign({},emp,{m:calc(mr,mWD),y:calc(yr,yWD)});
  });
}
function iamoCalcSup(stats,p){return stats.reduce(function(a,e){
  /* Excluir empregados sem horas disponíveis (ausentes) – não distorcem o total */
  if(e[p].avH<=0)return a;
  /* Cap individual: impede que sobre-apropriação de um infle o total além de 100% */
  var cappedPr=Math.min(e[p].prH,e[p].avH);
  return{av:a.av+e[p].avH,pr:a.pr+cappedPr,tot:a.tot+e[p].totH};
},{av:0,pr:0,tot:0});}
function iamoCalcDisc(stats){return Object.keys(IAMO_TEAM).map(function(d){
  var ms=stats.filter(function(e){return e.discipline===d;});
  /* Excluir ausentes (avH=0) do cálculo de disciplina */
  var av=ms.reduce(function(a,e){return a+(e.m.avH>0?e.m.avH:0);},0);
  var pr=ms.reduce(function(a,e){return a+(e.m.avH>0?Math.min(e.m.prH,e.m.avH):0);},0);
  var avY=ms.reduce(function(a,e){return a+(e.y.avH>0?e.y.avH:0);},0);
  var prY=ms.reduce(function(a,e){return a+(e.y.avH>0?Math.min(e.y.prH,e.y.avH):0);},0);
  return{d:d,av:av,pr:pr,iamo:iamoPct(pr,av),avY:avY,prY:prY,iamoY:iamoPct(prY,avY)};
});}

function iamoNormStr(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim();}
function iamoMatchToken(raw){
  var t=iamoNormStr(raw);
  if(t.length<2||/gonc|gonza/.test(t))return null;
  for(var i=0;i<IAMO_ALL.length;i++){
    for(var j=0;j<IAMO_ALL[i].aliases.length;j++){
      var al=iamoNormStr(IAMO_ALL[i].aliases[j]);
      if(al.length<3)continue;
      if(t.indexOf(al)===0||t===al)return IAMO_ALL[i];
    }
  }
  return null;
}
function iamoToISO(str){var m=str.match(/(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})/);if(!m)return null;var d=m[1].padStart(2,'0'),mo=m[2].padStart(2,'0'),y=m[3];if(y.length===2)y=(parseInt(y)<50?'20':'19')+y;return y+'-'+mo+'-'+d;}

function iamoProcessExcelFile(file,cb){
  if(typeof XLSX==='undefined'){toast('SheetJS não carregou.',false);if(cb)cb();return;}
  iamoState.busy=true;document.getElementById('iamoBusy').style.display='flex';document.getElementById('iamoBusyName').textContent=file.name;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true,dateNF:'dd/mm/yyyy hh:mm'});
      /* Try all sheets; pick the one with the most IAMO-column matches */
      var bestRows=null,bestScore=0;
      wb.SheetNames.forEach(function(sn){
        var ws=wb.Sheets[sn];
        var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',raw:false});
        var score=iamoExcelScore(rows);
        if(score>bestScore){bestScore=score;bestRows=rows;}
      });
      if(!bestRows){
        /* No sheets readable — use first sheet raw */
        bestRows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:'',raw:false});
      }
      var result=iamoParseExcel(bestRows,file.name);
      iamoState.tasks=iamoState.tasks.filter(function(t){return t.file!==file.name;}).concat(result.tasks);
      iamoState.files=iamoState.files.filter(function(f){return f.name!==file.name;}).concat({name:file.name,at:new Date().toLocaleString('pt-BR'),count:result.tasks.length,ok:true});
      toast(result.tasks.length?'✅ '+result.tasks.length+' tarefas importadas do Excel':'⚠ Nenhuma tarefa encontrada — a planilha deve ter colunas: Supervisão, Duração, Início, Nomes dos recursos',!!result.tasks.length);
    }catch(err){
      iamoState.files=iamoState.files.filter(function(f){return f.name!==file.name;}).concat({name:file.name,at:new Date().toLocaleString('pt-BR'),count:0,ok:false});
      toast('Erro ao ler Excel: '+err.message,false);
    }
    iamoState.busy=false;document.getElementById('iamoBusy').style.display='none';
    if(cb)cb();
  };
  reader.readAsArrayBuffer(file);
}
function iamoExcelScore(rows){
  var keywords=['data','supervisao','duracao','colaborador'];
  var score=0;
  for(var r=0;r<Math.min(10,rows.length);r++){
    var row=rows[r]||[];
    for(var c=0;c<row.length;c++){
      var cell=iamoNormStr(String(row[c]||''));
      keywords.forEach(function(k){if(cell.indexOf(k)>=0)score++;});
    }
  }
  return score;
}
function iamoParseDate(raw){
  if(!raw&&raw!==0)return null;
  if(raw instanceof Date&&!isNaN(raw.getTime()))return raw.toISOString().slice(0,10);
  var s=String(raw).trim();
  var iso=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(iso)return iso[1]+'-'+iso[2]+'-'+iso[3];
  return iamoToISO(s);
}
function iamoParseExcel(rows,fileName){
  var tasks=[];
  if(!rows||!rows.length)return{tasks:tasks};
  /* ── Detect header row and column positions ── */
  var colDate=-1,colDisc=-1,colOrdem=-1,colNome=-1,colDur=-1;
  var colColabs=[]; /* indices of all Colaborador X columns */
  var headerRow=-1;
  for(var r=0;r<Math.min(10,rows.length);r++){
    var row=rows[r]||[];var found=0;
    var tDate=-1,tDisc=-1,tOrdem=-1,tNome=-1,tDur=-1,tColabs=[];
    for(var c=0;c<row.length;c++){
      var cell=iamoNormStr(String(row[c]||''));
      if(!cell)continue;
      /* Date column */
      if(tDate<0&&(cell==='data'||cell==='data inicio'||cell==='data de inicio'||cell==='dt inicio')){tDate=c;found++;}
      /* Discipline/supervisão column */
      else if(tDisc<0&&(cell==='supervisao'||cell.indexOf('supervisao')>=0||cell==='disciplina')){tDisc=c;found++;}
      /* Order column */
      else if(tOrdem<0&&(cell==='ordem'||cell==='order'||cell==='os')){tOrdem=c;found++;}
      /* Task name column */
      else if(tNome<0&&(cell==='nome da tarefa'||cell==='nome tarefa'||cell==='nome'||cell.indexOf('nome da tarefa')>=0)){tNome=c;found++;}
      /* Duration column — must contain "dur" or "min" */
      else if(tDur<0&&(cell.indexOf('duracao')>=0||cell.indexOf('dur')===0||cell.indexOf('min')===0||cell==='minutos')){tDur=c;found++;}
      /* Collaborator columns — any column with "colaborador" or "recurso" */
      else if(cell.indexOf('colaborador')>=0||cell.indexOf('recursos')>=0||cell.indexOf('recurso')>=0||cell.indexOf('responsavel')>=0){tColabs.push(c);found++;}
    }
    if(found>=2){colDate=tDate;colDisc=tDisc;colOrdem=tOrdem;colNome=tNome;colDur=tDur;colColabs=tColabs;headerRow=r;break;}
  }
  /* Fallback: assume standard layout Data|Supervisão|Ordem|Nome da Tarefa|Duração|Colab1..9 */
  if(headerRow<0){
    colDate=0;colDisc=1;colOrdem=2;colNome=3;colDur=4;
    colColabs=[5,6,7,8,9,10,11,12,13];
    headerRow=0;
  }
  /* If no collaborator columns found in header, scan all remaining columns */
  if(!colColabs.length){
    var usedCols=[colDate,colDisc,colOrdem,colNome,colDur].filter(function(x){return x>=0;});
    var maxCol=(rows[headerRow]||[]).length;
    for(var ci=0;ci<maxCol;ci++){
      if(usedCols.indexOf(ci)<0)colColabs.push(ci);
    }
  }
  var startRow=headerRow+1;
  for(var i=startRow;i<rows.length;i++){
    var row=rows[i];
    if(!row||!row.length)continue;
    /* Duration */
    var durRaw=(colDur>=0&&colDur<row.length)?String(row[colDur]||'').trim():'';
    var minutes=parseInt(durRaw.replace(/[^\d]/g,''))||0;
    if(minutes<1||minutes>1440)continue;
    /* Date */
    var iniRaw=(colDate>=0&&colDate<row.length)?row[colDate]:null;
    var date=iamoParseDate(iniRaw);
    if(!date)continue;
    /* Skip weekends */
    var dt=new Date(date+'T12:00:00Z');
    if(dt.getUTCDay()%6===0)continue;
    /* Task name */
    var taskName=(colNome>=0&&colNome<row.length)?String(row[colNome]||'Tarefa').trim().slice(0,80):'Tarefa';
    if(!taskName)taskName='Tarefa';
    /* Order (for dedup key) */
    var ordemStr=(colOrdem>=0&&colOrdem<row.length)?String(row[colOrdem]||'').trim():'';
    /* Process EACH collaborator column independently */
    colColabs.forEach(function(colIdx){
      if(colIdx<0||colIdx>=row.length)return;
      var tok=String(row[colIdx]||'').trim();
      if(!tok)return;
      var emp=iamoMatchToken(tok);
      if(!emp)return;
      /* Dedup by empId + date + ordem + minutes to allow same-person multiple tasks same day */
      var taskKey=taskName.toLowerCase().replace(/\s+/g,'').slice(0,20);
      var dupKey=emp.id+'|'+date+'|'+ordemStr+'|'+minutes+'|'+taskKey;
      var dup=tasks.some(function(t){return(t.empId+'|'+t.date+'|'+(t.ordem||'')+'|'+t.minutes+'|'+(t.taskName||'').toLowerCase().replace(/\s+/g,'').slice(0,20))===dupKey;});
      if(!dup)tasks.push({id:Math.random().toString(36).substr(2,9),file:fileName,empId:emp.id,empName:emp.name,discipline:emp.discipline,minutes:minutes,date:date,taskName:taskName,ordem:ordemStr});
    });
  }
  return{tasks:tasks};
}

function odToDownloadUrl(url){

  if(url.includes('1drv.ms')||url.includes('onedrive.live.com')){var b2=url.split('#')[0];return b2+(b2.includes('?')?'&':'?')+'download=1';}
  if(url.includes('drive.google.com')||url.includes('docs.google.com')){var gdM=url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);if(gdM)return'https://drive.usercontent.google.com/download?id='+gdM[1]+'&export=download&authuser=0&confirm=t';var gdId=url.match(/[?&]id=([a-zA-Z0-9_-]+)/);if(gdId)return'https://drive.usercontent.google.com/download?id='+gdId[1]+'&export=download&authuser=0&confirm=t';}
  return url;
}
function fetchComCors(url){

    /* 5. allorigins /get – retorna {contents} envolvendo o JSON */

/* Dynamic sticky offsets – measures real header height so NAV never hides behind #H on any device */
function fixStickyOffsets(){
  /* v.01 layout: header is .header, nav is .tabs-wrapper – safe null checks */
  var headerEl=document.querySelector('.header')||document.getElementById('H');
  var hH=headerEl?headerEl.offsetHeight:60;

  var ft=document.getElementById('FT');

  var ab=document.getElementById('AB');
  var abH=ab&&ab.style.display!=='none'?ab.offsetHeight:0;
  var eq=document.getElementById('eqBand');

  var mvH=0;

  var navProg=document.getElementById('navProgress');

  document.documentElement.style.setProperty('--hH',hH+'px');
  document.documentElement.style.setProperty('--hHN',(hH+navH)+'px');

   Runs once; no-ops on mobile (< 1600px)
═══════════════════════════════════════════════════════ */
(function initDesktopLayout() {
  if (window.innerWidth < 1600) return;

  var app     = document.querySelector('.app');
  var tabsW   = document.querySelector('.tabs-wrapper');
  var tabsC   = document.querySelector('.tabs-container');
  var mv      = document.querySelector('.mv-container');
  var alerts  = document.querySelector('.alerts-section');
  var content = document.querySelector('.content-area');

  if (!app || !tabsW || !mv || !alerts || !content) return;

  /* 1. Inject sidebar logo header at top of tabs-wrapper */
  var sideHead = document.createElement('div');
  sideHead.className = 'sidebar-header';
  sideHead.innerHTML =
    '<div class="sidebar-icon">A</div>' +
    '<div class="sidebar-title"><strong>Automação</strong>Mina do Andrade</div>';
  tabsW.insertBefore(sideHead, tabsW.firstChild);

  /* 2. Insert nav group labels between tabs */
  if (tabsC) {
    var groups = [
      { tab: 0,  label: 'Dashboard' },
      { tab: 1,  label: 'Segurança & EPI' },
      { tab: 3,  label: 'Manutenção' },
      { tab: 6,  label: 'Pessoal & Agenda' },
      { tab: 8,  label: 'Qualidade' },
      { tab: 10, label: 'Dados & IAMO' },
      { tab: 13, label: 'Equipe' },
    ];
    groups.forEach(function(g) {
      var lbl = document.createElement('div');
      lbl.className = 'nav-group-label';
      lbl.textContent = g.label;
      var target = tabsC.querySelector('[data-tab="' + g.tab + '"]');
      if (target) tabsC.insertBefore(lbl, target);
    });
  }

  /* 3. Create the main scroll wrapper and append to body (outside .app) */
  var mainWrap = document.createElement('div');
  mainWrap.className = 'desktop-main-wrap';

  /* Move mv, alerts, content INTO the main wrapper */
  mainWrap.appendChild(mv);
  mainWrap.appendChild(alerts);
  mainWrap.appendChild(content);

  /* Append main wrapper to body directly so it sits in the fixed layout */
  document.body.appendChild(mainWrap);

  /* 4. Recalculate sticky offsets */
  if (typeof fixStickyOffsets === 'function') {
    setTimeout(fixStickyOffsets, 150);
  }
})();


}

/* ── Ticker ── */
function mRenderTicker(){
  var items=[];
  function dias(s){if(!s)return null;var p=(s||'').split('/');if(p.length!==3)return null;
    var d=new Date(p[2],p[1]-1,p[0]);var n=new Date();n.setHours(0,0,0,0);return Math.ceil((d-n)/86400000);}
  D.alertas.forEach(function(a){var d=dias(a.venc);if(d!==null&&d<=30)items.push(a.x.toUpperCase());});
  D.trein.forEach(function(t){var d=dias(t.venc);if(d!==null&&d<=30)items.push((t.n+' – '+t.p).toUpperCase());});
  var el=document.getElementById('mTicker');
  if(el)el.textContent=items.length?items.join(' · '):'Sem alertas nos próximos 30 dias';
}

/* ── KPI ── */
function mRenderKpi(){
  var K=D.kpis;
  function sc(v){var n=parseFloat((v||'').replace(',','.'));return n>=90?'cgn':n>=70?'cy':'crd';}
  function kc(lbl,obj,ico){
    var h='<div class="kc"><div class="klbl">'+ico+' '+lbl+'</div>';
    h+='<div class="kval '+sc(obj.val)+'">'+obj.val+'</div>';
    if(obj.meta)h+='<div class="kmeta">Meta: '+obj.meta+'</div>';
    h+='<div class="ksub">';
    (obj.sub||[]).forEach(function(s){h+='<span class="kchip '+(s.c||'')+'">'+s.l+': '+s.v+'</span>';});
    h+='</div></div>';return h;
  }
  var h='';
  // DF
  h+='<div class="kgrid">';
  D.df.forEach(function(df){
    var cor=df.val>=df.meta?'#10b981':df.val>=df.meta*0.9?'#f59e0b':'#ef4444';
    var lbl=df.lbl.replace('Disp. Física – ','');
    h+='<div class="kc"><div class="klbl">🏭 '+lbl+'</div>'
      +'<div class="kval" style="color:'+cor+';">'+df.val.toFixed(1)+'%</div>'
      +'<div class="kmeta">Meta: '+df.meta+'% Corr:+'+df.corr+'</div>'
      +'<div class="bar"><div class="barf" style="width:'+Math.min(100,df.val/df.meta*100)+'%;background:'+cor+';"></div></div>'
      +'</div>';
  });
  h+='</div>';
  h+='<div class="kgrid">';
  h+=kc('Aderência',K.aderencia,'📅');
  h+=kc('Disp. Ativos',K.dispAtivos,'⚙️');
  h+=kc('Cumpr. Planos',K.cumprPlanos,'📋');
  h+=kc('IAMO',K.aproprMO,'⏱');
  h+='</div>';
  // Rank
  var rank=D.rank.slice().sort(function(a,b){
    function p(x){return(x.s[0]||0)*3+(x.s[1]||0)-(x.s[2]||0)*2;}return p(b)-p(a);
  });
  h+='<div class="msec">🏆 Rank Segurança</div><div class="mc">';
  ['🥇','🥈','🥉','4','5'].forEach(function(m,i){
    if(!rank[i])return;var r=rank[i];
    h+='<div class="mli"><span class="mli-ico">'+m+'</span>'
      +'<div class="mli-body"><div class="mli-t">'+r.n+'</div>'
      +'<div class="mli-s">SIG:'+r.s[0]+' DSS:'+r.s[1]+' IPAR:'+r.s[2]+'</div></div></div>';
  });
  h+='</div>';
  // Alertas
  var hoje=new Date();hoje.setHours(0,0,0,0);
  function pd(s){if(!s)return null;var p=s.split('/');return p.length===3?new Date(p[2],p[1]-1,p[0]):null;}
  var ats=D.alertas.filter(function(a){var d=pd(a.venc);return d&&Math.ceil((d-hoje)/86400000)<=30;});
  if(ats.length){
    h+='<div class="msec">⚠️ Alertas</div><div class="mc">';
    ats.slice(0,6).forEach(function(a){
      var d=pd(a.venc);var dif=d?Math.ceil((d-hoje)/86400000):null;
      var sc2=dif===null?'#64748b':dif<0?'#ef4444':dif<=7?'#f59e0b':'#10b981';
      h+='<div class="mli"><span class="mli-ico" style="color:'+sc2+';">⚠</span>'
        +'<div class="mli-body"><div class="mli-t" style="font-size:11px;white-space:normal;">'+a.x+'</div>'
        +'<div class="mli-s" style="color:'+sc2+';">'+(dif!==null?(dif<0?Math.abs(dif)+'d atraso':dif+'d restantes'):a.venc)+'</div>'
        +'</div></div>';
    });
    h+='</div>';
  }
  // Ordens
  h+='<div class="msec">📋 Ordens</div><div class="mc">';
  var cor2={'AUTOMAÇÃO':'#f97316','INSTRUMENTAÇÃO':'#38bdf8','REDES':'#10b981'};
  Object.keys(D.ordens).forEach(function(disc){
    D.ordens[disc].forEach(function(o){
      h+='<div class="mli"><span class="mli-ico" style="color:'+(cor2[disc]||'#64748b')+';">▸</span>'
        +'<div class="mli-body"><div class="mli-t" style="font-size:11px;">'+o.id+' — '+o.desc+'</div>'
        +'<div class="mli-s" style="color:'+(cor2[disc]||'#64748b')+';">'+disc+'</div></div></div>';
    });
  });
  h+='</div>';

}

/* ── Mobile login success (called by doLogin override below) ── */
function mLoginSuccess(user){
  currentUser={username:user.username,isAdmin:user.isAdmin,displayName:user.displayName,role:user.isAdmin?'admin':'viewer'};
  try{sessionStorage.setItem(AUTH_SESSION_KEY,JSON.stringify(currentUser));}catch(e){}
  var auth=document.getElementById('mAuth');if(auth)auth.style.display='none';
  var app=document.getElementById('mApp');if(app)app.style.display='block';
  var eb=document.getElementById('mEditBtn');if(eb)eb.style.display=(user.isAdmin?'':'none');
  mInitApp();
}

/* ── Override _loginSuccess to show mobile app ── */
var _origLoginSuccess = window._loginSuccess;
window._loginSuccess = function(user){ mLoginSuccess(user); };

/* ── Override doLogin para garantir fluxo mobile em qualquer browser (incl. iOS Safari) ── */
window.doLogin = function(){
  var username=(document.getElementById('authUser').value||'').trim().toLowerCase();
  var password=document.getElementById('authPass').value||'';
  var errEl=document.getElementById('authErr');
  errEl.style.display='none';
  if(!username||!password){
    errEl.style.display='block';errEl.style.color='var(--rd)';
    errEl.textContent='Preencha usuário e senha.';return;
  }
  errEl.style.display='block';errEl.style.color='var(--mt)';errEl.textContent='Verificando...';
  GDA_hashPassword(password).then(function(hash){
    var baseUser=AUTH_USERS_BASE.find(function(u){return u.username===username&&u.passwordHash===hash;});
    if(baseUser){mLoginSuccess(baseUser);return;}
    if(firebaseReady){
      getFirebaseUsers().then(function(dynUsers){
        var dynUser=dynUsers.find(function(u){return u.username===username&&u.passwordHash===hash;});
        if(dynUser){mLoginSuccess(dynUser);}
        else{errEl.style.display='block';errEl.style.color='var(--rd)';errEl.textContent='Usuário ou senha incorretos.';document.getElementById('authPass').value='';document.getElementById('authPass').focus();}
      }).catch(function(){errEl.style.display='block';errEl.style.color='var(--rd)';errEl.textContent='Erro de conexão.';});
    }else{
      var dyn=[];try{dyn=JSON.parse(localStorage.getItem('gda_dyn_users'))||[];}catch(e){}
      var dynUser=dyn.find(function(u){return u.username===username&&u.passwordHash===hash;});
      if(dynUser){mLoginSuccess(dynUser);}
      else{errEl.style.display='block';errEl.style.color='var(--rd)';errEl.textContent='Usuário ou senha incorretos.';document.getElementById('authPass').value='';document.getElementById('authPass').focus();}
    }
  });
};

function mInitApp(){
  try{mInitIamoSelects();}catch(e){}
  try{
    /* Explicitly navigate to current page to ensure render */
    var p=_mCurPage||'kpi';
    ['kpi','iamo','equipe','seg','mais'].forEach(function(id){
      var pg=document.getElementById('mpg-'+id),nav=document.getElementById('mnav-'+id);
      if(pg)pg.classList.toggle('on',id===p);
      if(nav)nav.classList.toggle('on',id===p);
    });
    if(p==='kpi')     mRenderKpi();
    if(p==='iamo')    {mInitIamoSelects();try{iamoRenderAll();}catch(e){}}
    if(p==='equipe')  mRenderEquipe();
    if(p==='seg')     mRenderSeg();
    if(p==='mais')    mRenderMais(_maisCur||'agenda');
  }catch(e){try{mRenderKpi();}catch(ex){}}
  try{mRenderTicker();}catch(e){}
  try{mUpdateFbDot();}catch(e){}
  var ou=document.getElementById('odUrl');
  if(ou)ou.value=localStorage.getItem('gda_od_url')||'';
}
var _mCurPage='kpi';

/* ── Session restore on load ── */

/* ════ FIREBASE SYNC → MOBILE RENDER ════
   Override reRenderAll so Firebase updates refresh the mobile views       */
window.reRenderAll = function(){
  if(!window._IS_MOBILE_APP) return;
  /* Só renderiza se o app estiver visível (usuário logado) */
  var app=document.getElementById('mApp');
  if(!app||app.style.display==='none') return;
  /* Pulso visual no dot de sync */
  try{
    var dot=document.getElementById('mFbDot');
    if(dot){dot.style.background='#38bdf8';dot.style.transform='scale(1.6)';
      setTimeout(function(){dot.style.background='#10b981';dot.style.transform='scale(1)';},600);}
  }catch(e){}
  /* Sempre re-renderiza KPI e ticker */
  try{ if(typeof mRenderKpi==='function') mRenderKpi(); }catch(e){}
  try{ if(typeof mRenderTicker==='function') mRenderTicker(); }catch(e){}
  /* Re-renderiza a página corrente */
  var cur = document.querySelector('.mpg.on');
  if(cur){
    var id = cur.id;
    if(id==='mpg-equipe') try{mRenderEquipe();}catch(e){}
    if(id==='mpg-seg')    try{mRenderSeg();}catch(e){}
    if(id==='mpg-mais')   try{mRenderMais(_maisCur||'agenda');}catch(e){}
    if(id==='mpg-iamo')   try{iamoRenderAll();}catch(e){}
  }
};

/* Also override the individual reRender* that are called directly */
['reRenderDf','reRenderSeguranca','reRenderRankView','reRenderDssView',
 'reRenderOrdensView','reRenderForcesView','reRenderRiscoView',
 'reRenderTreinView','reRenderAgendaView','renderEpi','renderSenso',
 'buildEqBase','renderTicker','renderConquistasList',
 'renderCorretivas','renderProc','renderCal'].forEach(function(fn){
  window[fn] = function(){
    /* trigger full mobile refresh instead */
    try{
      var cur=document.querySelector('.mpg.on');
      if(!cur) return;
      var id=cur.id;
      if(id==='mpg-seg')  mRenderSeg();
      if(id==='mpg-mais') mRenderMais(_maisCur);
      if(id==='mpg-kpi')  mRenderKpi();
      mRenderTicker();
    }catch(e){}
  };
});

document.addEventListener('DOMContentLoaded', function(){
  /* Try to restore session */
  try{
    var s=sessionStorage.getItem(AUTH_SESSION_KEY);
    if(s){
      var u=JSON.parse(s);
      if(u&&u.username){
        currentUser=u;
        var auth=document.getElementById('mAuth');if(auth)auth.style.display='none';
        var app=document.getElementById('mApp');if(app)app.style.display='block';
        var eb=document.getElementById('mEditBtn');if(eb)eb.style.display=(u.isAdmin?'':'none');
        mInitApp();
        return;
      }
    }
  }catch(e){}
  /* No session - show auth */
  var auth=document.getElementById('mAuth');if(auth)auth.style.display='flex';
});

</script>
